<!DOCTYPE html>
<html>
<head>
    <title>IoT Planter Data Table</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; }
        a { display: inline-block; margin: 10px; font-size: 18px; }
    </style>
</head>
<body>
<h1>IoT Planter Data Table</h1>
<a href="/">Home</a>

<table>
    <tr>
        <th>Time</th>
        <th>Device</th>
        <th>Battery (V)</th>
        <th>Solar (V)</th>
        <th>Moisture (%)</th>
    </tr>
    <tbody>
        {% for entry in data %}
        <tr>
            <td>{{ entry.timestamp }}</td>
            <td>{{ entry.device_name }}</td>
            <td>{{ entry.battery_voltage }}</td>
            <td>{{ entry.solar_voltage }}</td>
            <td>{{ entry.moisture_percentage }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</body>
</html>
