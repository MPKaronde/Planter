<!DOCTYPE html>
<html>
<head>
    <title>Plant Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial; text-align: center; margin: 20px; }
        a { margin: 10px; display: inline-block; font-size: 18px; }
        h1 { margin-bottom: 10px; }
        #alert { font-size: 40px; font-weight: bold; color: white; padding: 20px; margin: 20px auto; width: 80%; display: block; border-radius: 8px; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        .chart-container { width: 90%; height: 400px; margin: 40px auto; }
        canvas { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>
<h1>🌱 Plant Monitor Dashboard</h1>
<a href="/">Home</a> | <a href="/data-view">Data Table</a>

<div id="alert">Loading...</div>

<div style="font-size: 30px; margin: 20px;">☀️ Hours of sunlight today: <span id="sunlight-today">0</span> h</div>
<div class="chart-container">
    <canvas id="sunlightChart"></canvas>
</div>

<div class="chart-container">
    <canvas id="solarChart"></canvas>
</div>
<div class="chart-container">
    <canvas id="moistureChart"></canvas>
</div>



<script>
const MOISTURE_TOO_LOW = 30;
const MOISTURE_WARNING = 40;
const MOISTURE_OK_LOW = 40;
const MOISTURE_OK_HIGH = 70;
const MOISTURE_TOO_HIGH = 70;

let solarChart, moistureChart, sunlightChart;

async function loadData() {
    const res = await fetch('/data');
    const data = await res.json();
    if (data.length === 0) return;

    const times = data.map(d => d.timestamp);
    const solar = data.map(d => d.solar_voltage);
    const moisture = data.map(d => d.moisture_percentage);

    // Moisture banner
    const latestMoisture = moisture[moisture.length-1];
    const alertBox = document.getElementById("alert");
    if (latestMoisture < MOISTURE_TOO_LOW) {
        alertBox.textContent = "⚠️ TOO DRY ⚠️"; alertBox.style.background = "red"; alertBox.style.color = "white"; alertBox.style.animation = "flash 1s infinite";
    } else if (latestMoisture > MOISTURE_TOO_HIGH) {
        alertBox.textContent = "⚠️ TOO WET ⚠️"; alertBox.style.background = "red"; alertBox.style.color = "white"; alertBox.style.animation = "flash 1s infinite";
    } else if (latestMoisture < MOISTURE_WARNING) {
        alertBox.textContent = "⚠️ LOW MOISTURE ⚠️"; alertBox.style.background = "yellow"; alertBox.style.color = "black"; alertBox.style.animation = "none";
    } else {
        alertBox.textContent = "✅ AOK"; alertBox.style.background = "green"; alertBox.style.color = "white"; alertBox.style.animation = "none";
    }

    // Solar line chart
    if (!solarChart) {
        solarChart = new Chart(document.getElementById('solarChart'), {
            type: 'line', data: { labels: times, datasets: [{ label: 'Solar Voltage (V)', data: solar, borderColor: 'orange', borderWidth: 2, tension: 0.3, fill: false }] },
            options: { responsive: true, maintainAspectRatio: false }
        });
    } else { solarChart.data.labels = times; solarChart.data.datasets[0].data = solar; solarChart.update(); }

    // Moisture line chart
    if (!moistureChart) {
        moistureChart = new Chart(document.getElementById('moistureChart'), {
            type: 'line', data: { labels: times, datasets: [{ label: 'Moisture (%)', data: moisture, borderColor: 'blue', borderWidth: 2, tension: 0.3, fill: false }] },
            options: { responsive: true, maintainAspectRatio: false }
        });
    } else { moistureChart.data.labels = times; moistureChart.data.datasets[0].data = moisture; moistureChart.update(); }
}

async function loadSunlightData() {
    const res = await fetch('/sunlight-data');
    const data = await res.json();
    document.getElementById('sunlight-today').textContent = data.today_hours.toFixed(1);

    const labels = Object.keys(data.weekly);
    const hours = Object.values(data.weekly);

    if (!sunlightChart) {
        sunlightChart = new Chart(document.getElementById('sunlightChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{ label: 'Hours of Sunlight', data: hours, backgroundColor: 'goldenrod' }]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
        });
    } else {
        sunlightChart.data.labels = labels;
        sunlightChart.data.datasets[0].data = hours;
        sunlightChart.update();
    }
}

setInterval(loadData, 2000);
setInterval(loadSunlightData, 60000);
loadData();
loadSunlightData();
</script>
</body>
</html>
