<!DOCTYPE html>
<html>
<head>
    <title>Plant Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin: 20px;
        }

        a {
            margin: 10px;
            display: inline-block;
            font-size: 18px;
        }

        h1 {
            margin-bottom: 10px;
        }

        /* Banner styles */
        #alert {
            display: block;
            font-size: 40px;
            font-weight: bold;
            color: white;
            padding: 20px;
            margin: 20px auto;
            width: 80%;
        }

        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        /* Chart containers */
        .chart-container {
            width: 90%;
            height: 400px;
            margin: 40px auto;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>

<body>

<h1>🌱 Plant Monitor Dashboard</h1>

<a href="/">Home</a> | 
<a href="/data-view">Data Table</a>

<div id="alert">Loading...</div>

<div class="chart-container">
    <canvas id="solarChart"></canvas>
</div>

<div class="chart-container">
    <canvas id="moistureChart"></canvas>
</div>

const MOISTURE_TOO_HIGH = 70;    // flashing red "Too Wet"
